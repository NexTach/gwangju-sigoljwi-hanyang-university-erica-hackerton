<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="support.js"></script>
</head>
<body>
<x-dc>

<helmet>
  <meta name="design_doc_mode" content="canvas">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    body{margin:0;background:#F1EBE3;font-family:'Pretendard',sans-serif}
    .dv-turn{padding:48px 56px 40px}
    .dv-thd{display:flex;align-items:baseline;gap:10px;margin:0 0 28px}
    .dv-tid{font:700 11px ui-monospace,Menlo,monospace;padding:4px 8px;background:#2E2A26;color:#fff;border-radius:6px;text-decoration:none}
    .dv-tname{font:800 15px/1.2 'Pretendard',sans-serif;color:#2E2A26}
    .dv-opts{display:flex;flex-wrap:wrap;gap:36px;align-items:flex-start}
    .dv-opt{flex:none;display:flex;flex-direction:column;gap:12px;scroll-margin-top:16px;width:300px}
    .dv-oid{font:700 11px ui-monospace,Menlo,monospace;padding:4px 9px;background:rgba(46,42,38,.08);color:#2E2A26;border-radius:6px;text-decoration:none}
    .dv-olabel{display:flex;align-items:baseline;gap:8px;font:600 13px/1.3 'Pretendard',sans-serif;color:#2E2A26}
    .dv-desc{font:500 12px/1.5 'Pretendard',sans-serif;color:#948C82}
    .dv-card{background:#FBF6F0;border-radius:28px;box-shadow:0 20px 48px rgba(46,42,38,.12);padding:36px;display:flex;flex-direction:column;align-items:center;gap:20px}
    .dv-opt:target .dv-oid{background:#FF5A36;color:#fff}
    .dv-next{margin:26px 0 0;font:500 12px/1.6 'Pretendard',sans-serif;color:#948C82}
    .dv-next a{color:#FF5A36}
  </style>
</helmet>

<section class="dv-turn" id="t1">
  <div class="dv-thd"><a class="dv-tid" href="#t1">1</a><span class="dv-tname">Road DNA 로고 시안 3개</span></div>
  <div class="dv-opts">

    <div class="dv-opt" id="1a">
      <div class="dv-olabel"><a class="dv-oid" href="#1a">1a</a>도로형 · Road Lane</div>
      <div class="dv-card">
        <svg width="112" height="112" viewBox="0 0 64 64" style="border-radius:24px; background:#FF5A36">
          <circle cx="7" cy="18" r="2.8" fill="#FFFFFF" opacity="0.45"></circle>
          <circle cx="12.5" cy="13" r="2.3" fill="#FFFFFF" opacity="0.65"></circle>
          <circle cx="17" cy="9" r="1.8" fill="#FFFFFF" opacity="0.9"></circle>
          <path d="M31 31 L46.5 54" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"></path>
          <rect x="20" y="10" width="9" height="44" rx="4.5" fill="#FFFFFF"></rect>
          <rect x="23.2" y="16" width="2" height="7" rx="1" fill="#FF5A36"></rect>
          <rect x="23.2" y="27" width="2" height="7" rx="1" fill="#FF5A36"></rect>
          <rect x="20" y="10" width="24" height="20" rx="10" fill="#FFFFFF"></rect>
          <rect x="27" y="15.2" width="11" height="9.6" rx="4.6" fill="#FF5A36"></rect>
        </svg>
        <svg width="32" height="32" viewBox="0 0 64 64" style="border-radius:8px; background:#FF5A36">
          <path d="M31 31 L46.5 54" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"></path>
          <rect x="20" y="10" width="9" height="44" rx="4.5" fill="#FFFFFF"></rect>
          <rect x="20" y="10" width="24" height="20" rx="10" fill="#FFFFFF"></rect>
          <rect x="27" y="15.2" width="11" height="9.6" rx="4.6" fill="#FF5A36"></rect>
        </svg>
        <div class="dv-desc" style="text-align:center">스템이 도로 · 내부 대시가 차선 · 왼쪽 점은 유입되는 크라우드소싱 데이터</div>
      </div>
    </div>

    <div class="dv-opt" id="1b">
      <div class="dv-olabel"><a class="dv-oid" href="#1b">1b</a>경로형 · Route Endpoint</div>
      <div class="dv-card">
        <svg width="112" height="112" viewBox="0 0 64 64" style="border-radius:24px; background:#FF5A36">
          <rect x="5" y="15" width="4.5" height="4.5" rx="1.2" fill="#FFFFFF" opacity="0.4"></rect>
          <rect x="10.5" y="10.5" width="4" height="4" rx="1.1" fill="#FFFFFF" opacity="0.6"></rect>
          <rect x="15.5" y="6.5" width="3.5" height="3.5" rx="1" fill="#FFFFFF" opacity="0.85"></rect>
          <path d="M31 30 Q42 40 45 47" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"></path>
          <circle cx="46.5" cy="52" r="7.5" fill="#FFFFFF"></circle>
          <rect x="20" y="10" width="9" height="44" rx="4.5" fill="#FFFFFF"></rect>
          <rect x="23.2" y="16" width="2" height="7" rx="1" fill="#FF5A36"></rect>
          <rect x="23.2" y="27" width="2" height="7" rx="1" fill="#FF5A36"></rect>
          <rect x="20" y="10" width="24" height="20" rx="10" fill="#FFFFFF"></rect>
          <rect x="27" y="15.2" width="11" height="9.6" rx="4.6" fill="#FF5A36"></rect>
        </svg>
        <svg width="32" height="32" viewBox="0 0 64 64" style="border-radius:8px; background:#FF5A36">
          <path d="M31 30 Q42 40 45 47" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"></path>
          <circle cx="46.5" cy="52" r="7.5" fill="#FFFFFF"></circle>
          <rect x="20" y="10" width="9" height="44" rx="4.5" fill="#FFFFFF"></rect>
          <rect x="20" y="10" width="24" height="20" rx="10" fill="#FFFFFF"></rect>
          <rect x="27" y="15.2" width="11" height="9.6" rx="4.6" fill="#FF5A36"></rect>
        </svg>
        <div class="dv-desc" style="text-align:center">다리가 곡선 경로로 흘러 종점의 데이터 포인트(원)에서 끝남 — 이동이 곧 지도가 된다는 개념</div>
      </div>
    </div>

    <div class="dv-opt" id="1c">
      <div class="dv-olabel"><a class="dv-oid" href="#1c">1c</a>데이터 레이어형 · Layered</div>
      <div class="dv-card">
        <svg width="112" height="112" viewBox="0 0 64 64" style="border-radius:24px; background:#FF5A36">
          <rect x="22" y="12" width="9" height="44" rx="4.5" fill="#FFFFFF" opacity="0.35"></rect>
          <rect x="20" y="10" width="9" height="44" rx="4.5" fill="#FFFFFF" opacity="0.65"></rect>
          <rect x="18" y="8" width="9" height="44" rx="4.5" fill="#FFFFFF"></rect>
          <rect x="21.2" y="14" width="2" height="7" rx="1" fill="#FF5A36"></rect>
          <rect x="21.2" y="25" width="2" height="7" rx="1" fill="#FF5A36"></rect>
          <path d="M29 29 L44.5 52" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" opacity="0.4"></path>
          <path d="M27 29 L42.5 52" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"></path>
          <rect x="18" y="8" width="24" height="20" rx="10" fill="#FFFFFF"></rect>
          <rect x="25" y="13.2" width="11" height="9.6" rx="4.6" fill="#FF5A36"></rect>
        </svg>
        <svg width="32" height="32" viewBox="0 0 64 64" style="border-radius:8px; background:#FF5A36">
          <path d="M27 29 L42.5 52" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"></path>
          <rect x="18" y="8" width="9" height="44" rx="4.5" fill="#FFFFFF"></rect>
          <rect x="18" y="8" width="24" height="20" rx="10" fill="#FFFFFF"></rect>
          <rect x="25" y="13.2" width="11" height="9.6" rx="4.6" fill="#FF5A36"></rect>
        </svg>
        <div class="dv-desc" style="text-align:center">겹겹의 반투명 레이어가 쌓여 하나의 R을 완성 — 개별 이동 데이터가 축적되어 도로 지능이 된다는 개념</div>
      </div>
    </div>

  </div>
  <p class="dv-next">다음: "<a href="#1a">1a</a> 색을 다르게" · "<a href="#1b">1b</a>의 원을 더 작게" · "<a href="#1c">1c</a> 레이어 개수 늘려서"</p>
</section>

</x-dc>
</body>
</html>
